<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Click Game Pro</title>

<style>
body {
 margin:0;
 font-family:Arial;
 background:#3498db;
 color:white;
 text-align:center;
 overflow:hidden;
}

#menu {
 position:absolute;
 inset:0;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:#3498db;
}

#gameUI {
 display:none;
}

#gameArea {
 position:relative;
 width:100%;
 height:70vh;
 background:#2980b9;
 overflow:hidden;
}

#target {
 position:absolute;
 width:60px;
 height:60px;
 display:none;
 cursor:pointer;
 transition:0.1s;
}

button {
 padding:10px;
 margin:5px;
 border:none;
 border-radius:8px;
 cursor:pointer;
}

#shop {
 display:none;
 background:rgba(0,0,0,0.8);
 padding:10px;
 border-radius:10px;
 margin-top:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
 <h1>Click Game Pro</h1>

 <button onclick="toggleShop()">Shop</button>
 <button onclick="startGame()">Start Game</button>

 <div id="shop">
  <h3>SKINS</h3>
  <button onclick="buySkin('red')">Red (10)</button>
  <button onclick="buySkin('neon')">Neon (20)</button>
  <button onclick="buySkin('gold')">Gold (30)</button>
 </div>
</div>

<!-- GAME -->
<div id="gameUI">
 <p id="score">Score: 0</p>
 <p id="coins">Coins: 0</p>
 <p id="highscore">Highscore: 0</p>
 <p id="timer">Tijd: 30</p>

 <button onclick="togglePause()">Pause</button>

 <div id="gameArea">
  <div id="target"></div>
 </div>
</div>

<!-- GAME OVER -->
<div id="gameOver" style="
 display:none;
 position:absolute;
 inset:0;
 background:rgba(0,0,0,0.85);
 flex-direction:column;
 justify-content:center;
 align-items:center;
">
 <h1>Game Over</h1>
 <p id="finalScore"></p>

 <button onclick="restart()">Play Again</button>

 <div id="shop2">
  <h3>SKINS</h3>
  <button onclick="buySkin('red')">Red (10)</button>
  <button onclick="buySkin('neon')">Neon (20)</button>
  <button onclick="buySkin('gold')">Gold (30)</button>
 </div>
</div>

<script>
let score = 0;
let coins = parseInt(localStorage.getItem("coins")) || 0;
let highscore = parseInt(localStorage.getItem("highscore")) || 0;

let timeLeft = 30;
let gameRunning = false;
let paused = false;

let skin = "default";

let timerInterval;
let moveTimeout;

const menu = document.getElementById("menu");
const gameUI = document.getElementById("gameUI");
const gameOver = document.getElementById("gameOver");
const target = document.getElementById("target");

document.getElementById("coins").innerText = "Coins: " + coins;
document.getElementById("highscore").innerText = "Highscore: " + highscore;

/* SHOP */
function toggleShop(){
 const shop = document.getElementById("shop");
 shop.style.display = shop.style.display === "block" ? "none" : "block";
}

/* START */
function startGame(){
 menu.style.display = "none";
 gameUI.style.display = "block";
 gameOver.style.display = "none";

 document.getElementById("shop").style.display = "none";

 score = 0;
 timeLeft = 30;
 paused = false;
 gameRunning = true;

 updateUI();

 timer();
 spawnTarget();
}

/* TIMER */
function timer(){
 clearInterval(timerInterval);

 timerInterval = setInterval(()=>{
  if(!gameRunning || paused) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Tijd: " + timeLeft;

  if(timeLeft <= 0){
   endGame();
  }
 },1000);
}

/* TARGET */
function spawnTarget(){
 if(!gameRunning || paused) return;

 const w = gameUI.clientWidth;
 const h = gameArea.clientHeight;

 target.style.display = "block";
 target.style.left = Math.random()*(w-60)+"px";
 target.style.top = Math.random()*(h-60)+"px";

 if(skin === "red") target.style.background = "#e74c3c";
 else if(skin === "neon") target.style.background = "linear-gradient(45deg,purple,cyan)";
 else if(skin === "gold") target.style.background = "gold";
 else target.style.background = "#2ecc71";

 clearTimeout(moveTimeout);
 moveTimeout = setTimeout(spawnTarget, 1200);
}

/* CLICK */
target.onclick = function(){
 if(!gameRunning || paused) return;

 score++;
 coins++;

 updateUI();
 spawnTarget();
}

/* PAUSE */
function togglePause(){
 if(!gameRunning) return;

 paused = !paused;

 if(paused){
  clearInterval(timerInterval);
  clearTimeout(moveTimeout);
 }
 else {
  timer();
  spawnTarget();
 }
}

/* BUY SKIN */
function buySkin(type){
 if(type === "red" && coins >= 10){
  coins -= 10;
  skin = "red";
 }
 if(type === "neon" && coins >= 20){
  coins -= 20;
  skin = "neon";
 }
 if(type === "gold" && coins >= 30){
  coins -= 30;
  skin = "gold";
 }

 updateUI();
}

/* UI */
function updateUI(){
 document.getElementById("score").innerText = "Score: " + score;
 document.getElementById("coins").innerText = "Coins: " + coins;
 document.getElementById("highscore").innerText = "Highscore: " + highscore;

 localStorage.setItem("coins", coins);
 localStorage.setItem("highscore", highscore);
}

/* END GAME */
function endGame(){
 gameRunning = false;
 paused = false;

 clearInterval(timerInterval);
 clearTimeout(moveTimeout);

 target.style.display = "none";

 if(score > highscore){
  highscore = score;
 }

 document.getElementById("finalScore").innerText = "Score: " + score;

 gameUI.style.display = "none";
 gameOver.style.display = "flex";

 updateUI();
}

/* RESTART */
function restart(){
 gameOver.style.display = "none";
 startGame();
}
</script>

</body>
</html>
